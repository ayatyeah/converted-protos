name: Generate Protobuf Go Files

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PROTO_REPO: ayatyeah/protos-repo
      PROTO_REPO_DIR: proto-source
      GIT_USER_NAME: YeahAyat
      GIT_USER_EMAIL: yeahayat@users.noreply.github.com

    steps:
      - name: Checkout generator repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone proto files repository
        run: |
          git clone https://github.com/${PROTO_REPO}.git ${PROTO_REPO_DIR}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate Go code from proto files
        run: |
          set -e
          if [ ! -d "${PROTO_REPO_DIR}" ]; then
            echo "Proto repository folder not found"
            exit 1
          fi

          find "${PROTO_REPO_DIR}" -type f -name "*.proto" | while read -r proto_file; do
            rel_path="${proto_file#${PROTO_REPO_DIR}/}"
            echo "Generating from ${rel_path}"
            protoc \
              -I "${PROTO_REPO_DIR}" \
              --go_out="." \
              --go_opt=paths=source_relative \
              --go-grpc_out="." \
              --go-grpc_opt=paths=source_relative \
              "${PROTO_REPO_DIR}/${rel_path}"
          done

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "${GIT_USER_NAME}"
            git config user.email "${GIT_USER_EMAIL}"
            git add .
            git commit -m "chore: regenerate protobuf go files"
            git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin HEAD
          else
            echo "No changes to commit"
          fi
